name: Deploy Hello World

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Deploy Files
        run: |
          rm -rf ~/deployed-app
          mkdir -p ~/deployed-app
          cp -R . ~/deployed-app

      - name: Verify Deployment
        run: |
          ls -la ~/deployed-app
          cat ~/deployed-app/app.py